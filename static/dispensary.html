<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dispensary Profile — Dispensary Engine WNY</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --panel2:#1c2128; --line:#30363d;
          --green:#3fb950; --green2:#2ea043; --text:#e6edf3; --muted:#8b949e;
          --blue:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
         font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  header { padding:22px 20px 10px; border-bottom:1px solid var(--line); }
  .header-inner { max-width:1100px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
  .logo { font-size:22px; font-weight:700; text-decoration:none; color:var(--text); }
  .logo span { color:var(--green); }
  nav a { color:var(--muted); text-decoration:none; margin-left:20px; font-size:14px; }
  nav a:hover { color:var(--green); }
  .wrap { max-width:1100px; margin:0 auto; padding:28px 20px; }
  .back { color:var(--muted); font-size:14px; text-decoration:none; display:inline-flex;
          align-items:center; gap:4px; margin-bottom:20px; }
  .back:hover { color:var(--green); }
  .profile-header { display:flex; gap:20px; align-items:flex-start; margin-bottom:28px;
        flex-wrap:wrap; }
  .profile-main { flex:1; min-width:200px; }
  .profile-name { font-size:28px; font-weight:700; margin:0 0 4px; }
  .plat-badge { font-size:12px; padding:4px 10px; border-radius:20px;
        background:var(--panel2); border:1px solid var(--line); color:var(--muted);
        text-transform:uppercase; letter-spacing:.5px; display:inline-block; margin-bottom:10px; }
  .profile-address { color:var(--muted); font-size:14px; margin:0 0 12px; }
  .profile-links { display:flex; gap:10px; flex-wrap:wrap; }
  .profile-link { padding:8px 16px; border-radius:8px; font-size:13px; font-weight:600;
        text-decoration:none; display:inline-block; }
  .profile-link.primary { background:var(--green2); color:#fff; }
  .profile-link.secondary { border:1px solid var(--line); color:var(--muted); }
  .profile-link.secondary:hover { border-color:var(--green); color:var(--green); }
  .profile-stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
        gap:10px; background:var(--panel); border:1px solid var(--line); border-radius:12px;
        padding:18px; min-width:240px; }
  .stat-item { text-align:center; }
  .stat-value { font-size:22px; font-weight:700; color:var(--green); }
  .stat-label { font-size:12px; color:var(--muted); margin-top:2px; }
  .cat-nav { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .cat-btn { padding:7px 14px; border-radius:8px; border:1px solid var(--line);
        background:var(--panel); color:var(--muted); font-size:13px; cursor:pointer; }
  .cat-btn:hover, .cat-btn.active { border-color:var(--green); color:var(--green); }
  .search-bar { display:flex; gap:10px; margin-bottom:16px; }
  .search-bar input { flex:1; padding:10px 14px; border-radius:8px; border:1px solid var(--line);
        background:var(--panel); color:var(--text); font-size:14px; }
  .product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
  .pcard { background:var(--panel); border:1px solid var(--line); border-radius:10px;
        padding:14px; cursor:pointer; transition:border-color .15s; }
  .pcard:hover { border-color:var(--green); }
  .pcard-img { width:100%; height:120px; object-fit:contain; border-radius:8px;
        background:var(--panel2); margin-bottom:10px; display:block; }
  .pcard-img-ph { width:100%; height:120px; border-radius:8px; background:var(--panel2);
        margin-bottom:10px; display:flex; align-items:center; justify-content:center;
        color:var(--muted); font-size:28px; }
  .pcard-title { font-weight:600; font-size:14px; line-height:1.3; margin-bottom:4px; }
  .pcard-meta { color:var(--muted); font-size:12px; margin-bottom:8px; }
  .pcard-footer { display:flex; justify-content:space-between; align-items:center; }
  .pcard-price { font-weight:700; font-size:16px; color:var(--green); }
  .pcard-was { font-size:12px; color:var(--muted); text-decoration:line-through; margin-right:4px; }
  .multi-badge { font-size:11px; color:var(--muted); }
  .best-deal { font-size:11px; color:var(--green); font-weight:600; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7);
        z-index:100; display:none; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--panel); border:1px solid var(--line); border-radius:14px;
        width:min(600px,95vw); max-height:85vh; overflow-y:auto; padding:24px; }
  .modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
  .modal-title { font-size:18px; font-weight:700; }
  .modal-close { background:none; border:none; color:var(--muted); font-size:20px;
        cursor:pointer; padding:0 4px; }
  .modal-close:hover { color:var(--text); }
  .ladder-row { display:grid; grid-template-columns:28px 1fr auto auto; gap:10px;
        align-items:center; padding:10px 12px; border:1px solid var(--line);
        border-radius:8px; margin-bottom:6px; }
  .ladder-row.best { border-color:var(--green); background:linear-gradient(90deg,#11261a,#161b22); }
  .rank { color:var(--muted); font-weight:700; text-align:center; }
  .disp-name { font-weight:600; font-size:14px; }
  .this-disp { color:var(--green); font-size:11px; font-weight:700; }
  .ladder-price { font-weight:700; }
  .visit-btn { background:var(--green2); color:#fff; text-decoration:none; border-radius:6px;
        padding:5px 10px; font-size:12px; font-weight:600; white-space:nowrap; }
  .empty { color:var(--muted); text-align:center; padding:60px; }
  .savings-bar { background:linear-gradient(90deg,#11261a,var(--panel)); border:1px solid var(--green);
        border-radius:8px; padding:10px 14px; color:var(--green); font-size:13px;
        margin-bottom:12px; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="/" class="logo">Dispensary <span>Engine</span></a>
    <nav>
      <a href="/">Search</a>
      <a href="/dispensaries">Dispensaries</a>
    </nav>
  </div>
</header>

<div class="wrap">
  <a href="/dispensaries" class="back">← Back to directory</a>
  <div id="profile-header"></div>
  <div class="cat-nav" id="cat-nav"></div>
  <div class="search-bar">
    <input type="text" id="prod-search" placeholder="Filter products…" oninput="filterProducts()"/>
  </div>
  <div class="product-grid" id="product-grid"><div class="empty">Loading…</div></div>
</div>

<!-- compare modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const dispensaryId = location.pathname.replace('/dispensary/', '').replace(/\/$/,'');
let profileData = null;
let activeCategory = 'all';

async function loadProfile() {
  const res = await fetch(`/api/dispensaries/${dispensaryId}`);
  if (!res.ok) {
    document.getElementById('profile-header').innerHTML = '<div class="empty">Dispensary not found.</div>';
    return;
  }
  profileData = await res.json();
  renderHeader();
  renderCatNav();
  renderProducts();
}

function renderHeader() {
  const d = profileData.dispensary;
  const addr = [d.address, d.city, d.state, d.zip].filter(Boolean).join(', ');
  const phone = d.phone ? `<div>📞 ${d.phone}</div>` : '';
  const links = [
    d.menu_url ? `<a class="profile-link primary" href="${d.menu_url}" target="_blank">View Menu</a>` : '',
    d.website_url ? `<a class="profile-link secondary" href="${d.website_url}" target="_blank">Website</a>` : '',
    d.specials_url ? `<a class="profile-link secondary" href="${d.specials_url}" target="_blank">Specials</a>` : '',
  ].filter(Boolean).join('');

  const totalProducts = profileData.product_count;
  const categories = profileData.categories;
  const onSale = Object.values(profileData.products_by_category).flat()
    .filter(p => p.sale_price && p.price && p.sale_price < p.price).length;

  document.title = `${d.name} — Dispensary Engine WNY`;
  document.getElementById('profile-header').innerHTML = `
    <div class="profile-header">
      <div class="profile-main">
        <span class="plat-badge">${d.platform}</span>
        <h1 class="profile-name">${d.name}</h1>
        ${addr ? `<p class="profile-address">${addr}</p>` : ''}
        ${phone}
        <div class="profile-links" style="margin-top:10px">${links}</div>
      </div>
      <div class="profile-stats">
        <div class="stat-item">
          <div class="stat-value">${totalProducts}</div>
          <div class="stat-label">Products</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">${categories.length}</div>
          <div class="stat-label">Categories</div>
        </div>
        ${onSale ? `<div class="stat-item">
          <div class="stat-value" style="color:#f0a500">${onSale}</div>
          <div class="stat-label">On Sale</div>
        </div>` : ''}
      </div>
    </div>`;
}

function renderCatNav() {
  const cats = profileData.categories;
  const allCount = profileData.product_count;
  let html = `<button class="cat-btn active" data-cat="all" onclick="setCategory(this,'all')">All (${allCount})</button>`;
  cats.forEach(cat => {
    const n = (profileData.products_by_category[cat] || []).length;
    html += `<button class="cat-btn" data-cat="${cat}" onclick="setCategory(this,'${cat}')">${cat} (${n})</button>`;
  });
  document.getElementById('cat-nav').innerHTML = html;
}

function setCategory(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCategory = cat;
  renderProducts();
}

function filterProducts() { renderProducts(); }

function renderProducts() {
  const q = document.getElementById('prod-search').value.trim().toLowerCase();
  let products = [];
  if (activeCategory === 'all') {
    products = Object.values(profileData.products_by_category).flat();
  } else {
    products = profileData.products_by_category[activeCategory] || [];
  }
  if (q) products = products.filter(p =>
    (p.canonical_title || '').toLowerCase().includes(q) ||
    (p.normalized_brand || '').toLowerCase().includes(q)
  );

  if (!products.length) {
    document.getElementById('product-grid').innerHTML = '<div class="empty">No products found.</div>';
    return;
  }
  document.getElementById('product-grid').innerHTML = products.map(p => {
    const onSale = p.sale_price && p.price && p.sale_price < p.price;
    const eff = p.effective_price != null ? `$${(+p.effective_price).toFixed(2)}` : '—';
    const was = onSale ? `<span class="pcard-was">$${(+p.price).toFixed(2)}</span>` : '';
    const img = p.image_url
      ? `<img class="pcard-img" src="${p.image_url}" alt="" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"/>
         <div class="pcard-img-ph" style="display:none">🌿</div>`
      : `<div class="pcard-img-ph">🌿</div>`;
    const meta = [p.normalized_brand, p.normalized_size, p.dominance_or_type]
      .filter(Boolean).join(' · ');
    const isLowest = p.shop_count > 1 && p.effective_price != null && +p.effective_price <= +p.market_low + 0.01;
    const shopBadge = p.shop_count > 1
      ? (isLowest ? `<span class="best-deal">✓ Best Price</span>` : `<span class="multi-badge">${p.shop_count} shops</span>`)
      : '';
    return `<div class="pcard" onclick="openCompare('${p.mcp_id}','${(p.canonical_title||'').replace(/'/g,"\\'")}')">
      ${img}
      <div class="pcard-title">${p.canonical_title}</div>
      ${meta ? `<div class="pcard-meta">${meta}</div>` : ''}
      <div class="pcard-footer">
        <div class="pcard-price">${was}${eff}</div>
        ${shopBadge}
      </div>
    </div>`;
  }).join('');
}

async function openCompare(mcpId, title) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = '<div style="color:var(--muted);padding:20px;text-align:center">Loading…</div>';
  document.getElementById('modal').classList.add('open');
  const d = await (await fetch(`/api/compare/${mcpId}`)).json();
  const savings = (d.price_max && d.price_min && d.price_max > d.price_min)
    ? `<div class="savings-bar">💰 Save up to $${(d.price_max - d.price_min).toFixed(2)} (${Math.round((d.price_max-d.price_min)/d.price_max*100)}%) vs. highest price</div>`
    : '';
  const rows = d.offers.map((o, i) => {
    const eff = o.effective_price != null ? `$${(+o.effective_price).toFixed(2)}` : '—';
    const isThis = o.dispensary_id === dispensaryId;
    const strike = (o.sale_price && o.price && o.sale_price < o.price)
      ? `<span style="text-decoration:line-through;color:var(--muted);font-size:12px;margin-right:4px">$${(+o.price).toFixed(2)}</span>` : '';
    return `<div class="ladder-row ${i===0?'best':''}">
      <div class="rank">${i+1}</div>
      <div>
        <div class="disp-name">${o.dispensary_name}</div>
        ${isThis ? '<div class="this-disp">← HERE</div>' : (i===0?'<div class="this-disp" style="color:#f0a500">BEST VALUE</div>':'')}
      </div>
      <div class="ladder-price">${strike}${eff}</div>
      ${o.product_url ? `<a class="visit-btn" href="${o.product_url}" target="_blank">View</a>` : '<span></span>'}
    </div>`;
  }).join('');
  document.getElementById('modal-body').innerHTML = `${savings}${rows}`;
}

function closeModal(e) {
  if (e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
}

loadProfile();
</script>
</body>
</html>
